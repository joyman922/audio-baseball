<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오디오 베이스볼</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        textarea {
            width: 100%; height: 150px; font-size: 18px;
            padding: 10px; margin-bottom: 20px;
            background-color: #f0f0f0; cursor: default;
        }
        button { padding: 10px 20px; font-size: 16px; margin-right: 10px; margin-bottom: 10px; display: block; }
        .sr-only {
            position: absolute; width: 1px; height: 1px;
            margin: -1px; padding: 0; overflow: hidden;
            clip: rect(0, 0, 0, 0); border: 0;
        }
        .version-text { margin-top: 30px; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div id="ariaAnnouncer" class="sr-only" aria-live="assertive"></div>

<div id="mainMenuScreen" class="screen active">
        <h1>오디오 베이스볼</h1>
        <button id="btnGoSinglePlayer">1. 개인 플레이</button>
        <button id="btnGoHelp">2. 도움말</button>

        <button id="btnGoVolume">3. 소리 설정</button>


        <div class="version-text">2026-05-10 버전 1.01010</div>
    </div>

    <div id="volumeScreen" class="screen">
        <h1>소리 설정</h1>
        <label for="volumeSlider">마스터 볼륨 (방향키로 조절)</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="10" step="5">
        <div>
            <button id="btnBackFromVolume">뒤로가기</button>
        </div>
    </div>



    <div id="singlePlayerScreen" class="screen">
        <h1>개인 플레이</h1>
        <button id="btnBattingPractice">1. 타격 연습</button>
        <button id="btnPitchingPractice">2. 투구 연습</button>
        <button id="btnPracticeMatch">3. 연습경기</button>
        <button id="btnBackToMain">뒤로가기</button>
    </div>

    <div id="gameScreen" class="screen">
        <h1>타격 연습</h1>
        <label for="gameArea">야구 게임 컨트롤 창</label>
        <textarea id="gameArea" readonly aria-label="타격 연습창"></textarea>
        <div>
            <button id="btnExitGame">나가기</button>
        </div>
    </div>

    <script>
        function switchScreen(screenId, focusElementId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            if (focusElementId) {
                document.getElementById(focusElementId).focus();
            }
        }

document.getElementById("btnGoSinglePlayer").addEventListener("click", () => { switchScreen("singlePlayerScreen", "btnBattingPractice"); });
        document.getElementById("btnBackToMain").addEventListener("click", () => { switchScreen("mainMenuScreen", "btnGoSinglePlayer"); });
        document.getElementById("btnGoHelp").addEventListener("click", () => { speak("도움말 메뉴는 아직 준비 중입니다."); });
        
        // [추가] 볼륨 설정 메뉴 스크립트
        document.getElementById("btnGoVolume").addEventListener("click", () => { 
            switchScreen("volumeScreen", "volumeSlider"); 
            speak("소리 설정 메뉴입니다. 좌우 방향키로 볼륨을 조절하세요."); 
        });
        document.getElementById("btnBackFromVolume").addEventListener("click", () => { switchScreen("mainMenuScreen", "btnGoSinglePlayer"); });
        document.getElementById("volumeSlider").addEventListener("change", (e) => {
            let vol = e.target.value;
            masterGain.gain.value = vol / 100;
            speak(vol + " 퍼센트");
            if (audioBuffers["powerhit1"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["powerhit1"];
                src.connect(audioCtx.destination); src.start();
            }
        });

let gameMode = 'batting'; let pPitchId = 'p_4seam'; let pZIdx = 5; let pYIdx = 2; let aiSwingType = 'normal';
        document.getElementById("btnPitchingPractice").addEventListener("click", () => { gameMode = 'pitching'; document.querySelector("#gameScreen h1").innerText = "투구 연습"; document.getElementById("gameArea").setAttribute("aria-label", "투구 연습창"); switchScreen("gameScreen", "gameArea"); speak("투구 연습 시작. 기본 구종 포심."); });



        document.getElementById("btnPracticeMatch").addEventListener("click", () => { speak("연습경기 모드는 아직 준비 중입니다."); });
        

document.getElementById("btnBattingPractice").addEventListener("click", () => {
            gameMode = 'batting'; document.querySelector("#gameScreen h1").innerText = "타격 연습"; document.getElementById("gameArea").setAttribute("aria-label", "타격 연습창"); switchScreen("gameScreen", "gameArea");
            speak("타격 연습 시작.");
        });


        document.getElementById("btnExitGame").addEventListener("click", () => {
            if (confirm("메인 메뉴로 돌아가시겠습니까?")) {
                switchScreen("mainMenuScreen", "btnGoSinglePlayer");
                speak("메인 메뉴로 돌아왔습니다.");
            } else {
                document.getElementById("gameArea").focus();
            }
        });

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffers = {}; 
        const pitchBufferCache = {}; 
        
        // [추가] 마스터 볼륨 제어용 글로벌 게인 노드 및 라우팅 패치
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;
        masterGain.connect(audioCtx.destination);
        
        const originalConnect = AudioNode.prototype.connect;
        AudioNode.prototype.connect = function() {
            if (arguments[0] === audioCtx.destination) {
                return originalConnect.call(this, masterGain);
            }
            return originalConnect.apply(this, arguments);
        };
        
// 탁한 포구음(glove3) 복구하여 다양성 추가 및 정타(powerhit) 소리 추가
        const SOUND_URLS = {



            hit1: "hit1.ogg", hit2: "hit2.ogg", hit3: "hit3.ogg",
            powerhit1: "powerhit1.ogg", powerhit2: "powerhit2.ogg",
            glove1: "glove1.ogg", glove2: "glove2.ogg", glove3: "glove3.ogg",
            foul1: "foul1.ogg", bunt: "bunt.ogg",
            swing1: "swing1.ogg", swing2: "swing2.ogg", walk1: "walk1.ogg",
            bounce: "bounce.ogg", fence: "fence.ogg",
            // [추가] 투수 와인드업 및 심판 판정 오디오 추가
            pitcher: "pitcher.ogg",
            umpire_ball: "umpire3-0-0.ogg", umpire_strike: "umpire3-1-0.ogg",
            umpire_safe1: "umpire3-2-0.ogg", umpire_safe2: "umpire3-2-1.ogg",
            umpire_out: "umpire3-3-0.ogg"
        };



        async function loadSound(name, url) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
                }
            } catch (e) {}
        }
        for (let key in SOUND_URLS) loadSound(key, SOUND_URLS[key]);

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            return buffer;
        }
        const noiseBuffer = createNoiseBuffer();

        const baseFrequencies = [220.00, 233.08, 246.94, 261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00];
        function getPianoFrequency(noteIndex, octaveIndex) { return baseFrequencies[noteIndex] * Math.pow(2, octaveIndex - 2); }

const zoneTop = 1.05; const zoneBottom = 0.50; 
        const zoneInside = 2.0; const zoneOutside = -2.0; // 존 4m로 개편 (0.5m 간격)


let isLeftBatter = false, isLeftPitcher = false, isPitching = false, hasSwung = false, isBunting = false, isInPlay = false; 
        let pitchStartTime = 0, pitchTimeout, currentPitchName = "";



        let currentFlightTime = 0, lastPitchSpeedMph = 0, speedToggleState = 0; 

let activeNodes = [], boxStep = 0, actualY, actualZ, isStrike = false, pitchResultText = "";


let rtBallStartX = 0, rtBallStartZ = 0, rtBallEndX = 0, rtBallEndZ = 0, rtBallStartTime = 0, rtBallFlightTime = 0.1, rtBallTrajectory = 'ground';
        let beaconSrc = null;

        
        let currentSwingMode = 'normal';




        const announcer = document.getElementById("ariaAnnouncer");
        function speak(text) { announcer.textContent = ""; setTimeout(() => { announcer.textContent = text; }, 50); }

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function getBoxName(step) {
            if (step === 0) return "타석 중앙";
            return step < 0 ? "앞으로 " + Math.abs(step) + "칸" : "뒤로 " + step + "칸";
        }

        function getAvatarX() {
            return isLeftBatter ? (boxStep * -0.45) : (boxStep * 0.45);
        }

// [수정] 타격 시 투구/바람 소리를 즉시(0.02초) 차단하여 빈틈없이 타격감을 극대화 (오디오 공백 없음)
        function handleHitFadeOut() {
            const now = audioCtx.currentTime;
            activeNodes.forEach(node => {
                try {
                    if (node.type === 'pitch' || node.type === 'inplay') {
                        node.gain.cancelScheduledValues(now);
                        node.gain.setValueAtTime(node.gain.value, now);
                        // 0.3초였던 페이드아웃을 0.02초로 단축시켜 타격음과 겹치는 지저분한 소리를 즉시 날려버림
                        node.gain.exponentialRampToValueAtTime(0.001, now + 0.02); 
                        node.src.stop(now + 0.05); 
                    } else if (node.type === 'mitt') {
                        node.src.stop(now); 
                    }
                } catch(e) {}
            });
            activeNodes = [];
        }



        function stopAllActiveNodes() {
            activeNodes.forEach(node => { try { node.src.stop(); } catch(e) {} });
            activeNodes = [];
        }

function updateListenerPosition(instant = false) {
            let currentListenerZ = gameMode === 'pitching' ? 0 : (isLeftBatter ? -3.5 : 3.5); let avatarX = gameMode === 'pitching' ? (!isLeftBatter ? -18 : 18) : getAvatarX(); let avatarY = gameMode === 'pitching' ? 1.5 : 0;
            let fX = gameMode === 'pitching' ? (!isLeftBatter?1:-1) : 0; let fZ = gameMode === 'pitching' ? 0 : -1;
            if(audioCtx.listener.forwardX) { audioCtx.listener.forwardX.value=fX; audioCtx.listener.forwardZ.value=fZ; } else { audioCtx.listener.setOrientation(fX,0,fZ, 0,1,0); }
            if (instant) {
                audioCtx.listener.positionX.setValueAtTime(avatarX, audioCtx.currentTime);
                audioCtx.listener.positionY.setValueAtTime(avatarY, audioCtx.currentTime);
                audioCtx.listener.positionZ.setValueAtTime(currentListenerZ, audioCtx.currentTime);
            } else {





                audioCtx.listener.positionX.linearRampToValueAtTime(avatarX, audioCtx.currentTime + 1.0);
                audioCtx.listener.positionY.setValueAtTime(avatarY, audioCtx.currentTime);
                audioCtx.listener.positionZ.linearRampToValueAtTime(currentListenerZ, audioCtx.currentTime + 1.0);
            }

        }

        function playWalkSound() {
            const panner = audioCtx.createPanner();
            panner.panningModel = 'equalpower'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 25;
            panner.positionX.value = getAvatarX(); panner.positionY.value = 0; panner.positionZ.value = isLeftBatter ? -3.5 : 3.5; 
            const walkGain = audioCtx.createGain(); walkGain.gain.value = 0.5;

            if (audioBuffers["walk1"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["walk1"];
                src.connect(panner); panner.connect(walkGain); walkGain.connect(audioCtx.destination); src.start();
            }
        }

        function playSwingSound() {
            const r = Math.floor(Math.random() * 2) + 1;
            if (audioBuffers[`swing${r}`]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers[`swing${r}`];
                src.connect(audioCtx.destination); src.start();
            }
        }

// [수정] 스테레오 사운드 분산 현상을 막고 타석 중앙에서 명확히 들리도록 HRTF Panner 강제 적용
        function playHitSound(isBuntHit = false, isPowerHit = false) {
            let bufferName = isBuntHit ? "bunt" : `hit${Math.floor(Math.random() * 3) + 1}`;
            let hitVolume = 0.7; 

            if (isPowerHit && !isBuntHit) {
                bufferName = `powerhit${Math.floor(Math.random() * 2) + 1}`;
                hitVolume = 1.4; 
            }
            
            if (audioBuffers[bufferName]) {
                const source = audioCtx.createBufferSource(); source.buffer = audioBuffers[bufferName];
                
                // [추가] 파워히트 사운드를 타석 중앙(0,0)에 완벽히 묶어두는 3D 음향 노드
                const panner = audioCtx.createPanner();
                panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
                panner.channelCount = 1; panner.channelCountMode = "explicit";
                panner.positionX.value = 0; panner.positionZ.value = 0; panner.positionY.value = 1.0; // 타자 타점 높이

                const gainNode = audioCtx.createGain(); 
                gainNode.gain.value = hitVolume;
                
                source.connect(panner); panner.connect(gainNode); gainNode.connect(audioCtx.destination); source.start();
            }
        }





        function playBatFoulSound() {
            if (audioBuffers["foul1"]) {
                const source = audioCtx.createBufferSource(); source.buffer = audioBuffers["foul1"];
                source.connect(audioCtx.destination); source.start();
            }
        }

// [수정] 스테레오 파일의 공간감 상실(중앙 집중)을 막기 위해 channelCount = 1 강제 적용 및 정적 좌표 할당
        function playBounceSound(x, z, timeOffset = 0) {
            const now = audioCtx.currentTime + timeOffset;
            const panner = audioCtx.createPanner();
            panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
            panner.channelCount = 1; panner.channelCountMode = "explicit"; // 오디오를 강제 모노로 묶어 3D 위치를 명확히 함
            
            panner.positionX.value = x;
            panner.positionZ.value = z;
            panner.positionY.value = 0; 
            
            if (audioBuffers["bounce"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["bounce"];
                src.connect(panner); panner.connect(audioCtx.destination); src.start(now);
            }
        }

        // [추가] 3D 공간 음향이 적용된 심판 판정 소리 출력 함수
        function playUmpireSound(type, x, z) {
            const panner = audioCtx.createPanner();
            panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
            panner.channelCount = 1; panner.channelCountMode = "explicit";
            
            panner.positionX.value = x; panner.positionZ.value = z; panner.positionY.value = 1.5; 

            let bufferName = "";
            if (type === 'ball') bufferName = "umpire_ball";
            else if (type === 'strike') bufferName = "umpire_strike";
            else if (type === 'out') bufferName = "umpire_out";
            else if (type === 'safe') bufferName = Math.random() < 0.5 ? "umpire_safe1" : "umpire_safe2";

            if (audioBuffers[bufferName]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers[bufferName];
                const gain = audioCtx.createGain(); gain.gain.value = 1.5; 
                src.connect(panner); panner.connect(gain); gain.connect(audioCtx.destination); src.start();
            }
        }

        function playFenceSound(x, z) {
            const panner = audioCtx.createPanner();
            panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
            panner.channelCount = 1; panner.channelCountMode = "explicit";
            
            panner.positionX.value = x; panner.positionZ.value = z; panner.positionY.value = 0; 
            if (audioBuffers["fence"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["fence"];
                src.connect(panner); panner.connect(audioCtx.destination); src.start();
            } else if (audioBuffers["bounce"]) { 
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["bounce"];
                src.connect(panner); panner.connect(audioCtx.destination); src.start();
            }
        }




        // [수정] 0.1초 글리산도 오버랩 및 타구음 죽지 않도록 감쇄율 0.05 극한 고정

function playBallFlightSound(startX, startZ, endX, endZ, flightTime, rollTime, vel, trajectory = 'ground', isThrow = false) {
            const now = audioCtx.currentTime;
            
rtBallStartX = startX; rtBallStartZ = startZ; 
            rtBallEndX = endX; rtBallEndZ = endZ;
            rtBallStartTime = now; rtBallFlightTime = flightTime + rollTime; rtBallTrajectory = trajectory;


            const src = audioCtx.createBufferSource(); src.buffer = noiseBuffer; src.loop = true;
            
            let baseFreq = 800;




            let peakVol = 0.3; // 타구음 기본 볼륨 넉넉히

            if (isThrow) {
                baseFreq = 1000; 
                peakVol = 0.1; // 송구음은 과하지 않게 적절히 조절
            }

            const filter = audioCtx.createBiquadFilter(); filter.type = "bandpass"; 
            const gain = audioCtx.createGain();
            
            filter.frequency.setValueAtTime(baseFreq, now);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(peakVol, now + 0.1);

            let totalMoveTime = flightTime + rollTime;

if (trajectory === 'fly') {
                filter.frequency.exponentialRampToValueAtTime(Math.max(150, baseFreq * 0.5), now + totalMoveTime); 
                gain.gain.linearRampToValueAtTime(peakVol * 0.5, now + totalMoveTime); 

// [수정] 타이머 지연으로 인한 오디오 빈틈을 막기 위해 0.15초 서스테인 추가
                gain.gain.setValueAtTime(peakVol * 0.5, now + totalMoveTime + 0.15);
            } else {
                gain.gain.setValueAtTime(peakVol, now + totalMoveTime);
                // [수정] 타이머 지연으로 인한 오디오 빈틈을 막기 위해 0.15초 서스테인 추가
                gain.gain.setValueAtTime(peakVol, now + totalMoveTime + 0.15);
            }

            // 송구음/타구음 끝날 때 뚝 끊기지 않고 0.4초 글리산도 페이드아웃 (자연스러운 여운)
            gain.gain.exponentialRampToValueAtTime(0.001, now + totalMoveTime + 0.55);


            const panner = audioCtx.createPanner();
            panner.panningModel = 'equalpower'; 
            panner.distanceModel = 'linear'; 
            panner.refDistance = 1; 
            panner.maxDistance = 1000; 
            panner.rolloffFactor = 0.05; // 거리가 멀어져도 절대 소리가 소멸되지 않음

            panner.positionX.setValueAtTime(startX, now);


panner.positionX.linearRampToValueAtTime(endX, now + totalMoveTime);


let yCurve = [1.0]; 
            if (trajectory === 'fly') {
                let h1 = endZ >= -60 ? (Math.random() * 4 + 6) : (Math.random() * 5 + 10);
                let h2 = endZ >= -60 ? 2.0 : (Math.random() < 0.1 ? 0 : 2.0); 
                yCurve = [1.0, h1, h2];
            } else if (trajectory === 'line') {
                let targetY = Math.random() * 1.5 + 0.5; // 내/외야 모두 0.5~2.0 정점
                yCurve = [1.0, targetY, 0]; // 공이 도착 지점(Z)에서 정확히 Y=0으로 떨어져 바운스됨
            } else if (trajectory === 'ground') { yCurve = [1.0, 0, 0]; } 
            else { yCurve = [1.0, 2.0, 0.5]; }





            if (['fly', 'line', 'wall', 'ground'].includes(trajectory)) { panner.positionY.setValueCurveAtTime(new Float32Array(yCurve), now, totalMoveTime); } 
            else { panner.positionY.value = 0; }




            panner.positionZ.setValueAtTime(startZ, now);


            panner.positionZ.linearRampToValueAtTime(endZ, now + totalMoveTime);

src.connect(filter); filter.connect(gain); gain.connect(panner); panner.connect(audioCtx.destination);
            src.start(now); 
            
            // [수정] 페이드아웃 연장에 맞춰 안전하게 0.7초 대기 후 종료
            src.stop(now + totalMoveTime + 0.7); 
            
            activeNodes.push({ type: 'inplay', src: src, gain: gain });


        }





// [수정] 포구음 다양성을 위해 glove 1~3번 모두 랜덤 사용 및 자연스러운 공간감 적용

function playGloveCatchSound(x, z) {
            stopRestingSound();
            const panner = audioCtx.createPanner();


            // 포구음과 아웃 심판 콜이 완벽히 같은 위치에서 들리도록 HRTF 적용 및 스테레오 분산 방지
            panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
            panner.channelCount = 1; panner.channelCountMode = "explicit";
            
            panner.positionX.value = x; panner.positionZ.value = z; panner.positionY.value = 0;


            
            let r = Math.floor(Math.random() * 3) + 1; 
            if (audioBuffers[`glove${r}`]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers[`glove${r}`];

                        speak(`주자 계속 달립니다! ${caughtByName}, ${targetBaseName}로 송구!${coverText}`);
                        await sleep(throwTime * 1000);
                        playGloveCatchSound(targetCoord.x, targetCoord.z);
                        playUmpireSound('safe', targetCoord.x, targetCoord.z);
                    } else {
                        speak(`${caughtByName}, ${targetBaseName}로 송구! 접전입니다!${coverText}`);




                        await sleep(throwTime * 1000); 
                        playGloveCatchSound(targetCoord.x, targetCoord.z); 
                        if (targetRunnerTime < totalDefensiveTime) {
                            playUmpireSound('safe', targetCoord.x, targetCoord.z);
                        } else {
                            playUmpireSound('out', targetCoord.x, targetCoord.z);
                        }




}
                    await sleep(800);
                } else {
                    speak(`${caughtByName}, ${targetBaseName}로 송구!${coverText}`);
                    await sleep(throwTime * 1000); 
                    playGloveCatchSound(targetCoord.x, targetCoord.z);






if (targetRunnerTime < totalDefensiveTime) {
                        playUmpireSound('safe', targetCoord.x, targetCoord.z);
                        if (targetBase === '1b') speak(`내야 안타!`);
                        if (targetBase === 'c') speak(`홈인, 득점 성공`);
                    } else {
                        playUmpireSound('out', targetCoord.x, targetCoord.z);
                    }
                    await sleep(800);




                }





            } else {
                await sleep(1500); 
            }

            stopStepNodes();
            updateListenerPosition(false); 
            isInPlay = false; 
            speak("타석 복귀.");
        }






        function swingBat(swingType = 'normal') {
            if (!isPitching && !isInPlay) { 
                playSwingSound(); 
                return; 
            }
            if (hasSwung) return; 

            const now = performance.now();

if (isPitching && pitchStartTime === 0) {
                playSwingSound(); 
                // [수정] 헛스윙 시 즉각적인 구심 콜을 멈추고 변수에 저장하여 포구 후 선언되도록 변경
                window.isMissedSwing = true;
                hasSwung = true;
                return;
            }

            hasSwung = true; 
            if (isBunting) isBunting = false; 

            const swingTime = now - pitchStartTime;
            let audioHitX = getAvatarX();
            let distanceToBatter = isLeftBatter ? (18 - audioHitX) : (18 + audioHitX);
            const perfectTime = (currentFlightTime * 1000) * (distanceToBatter / 19.5); 
            const timeDiff = Math.abs(swingTime - perfectTime);
            
            if (!isStrike) {
                playSwingSound(); 
                window.isMissedSwing = true; // [수정] 볼 스윙
                return; 
            }

            let result = calculateHitResult(swingType, timeDiff);

            if (result.type === 'miss') {
                playSwingSound(); 
                window.isMissedSwing = true; // [수정] 타이밍 헛스윙
            }






else if (result.type === 'foul') {
                let isFT = Math.random() < 0.1; if (!isFT) { handleHitFadeOut(); clearTimeout(pitchTimeout); }
                playBatFoulSound(); if (isFT) { window.isMissedSwing = true; speak("파울 팁!"); return; }
                
                // 심판의 스트라이크 콜을 제거하여 아웃으로 혼동하는 현상 방지

                if (result.msg.includes("커트")) {
                    speak("커트.");
                } else {
                    speak("파울.");
                }
                
                // 음성 안내 길이에 맞춰 대기 시간 단축
                setTimeout(() => {
                    isPitching = false;
                }, 1200);
            }



else if (result.inPlay) {
                handleHitFadeOut(); clearTimeout(pitchTimeout);
                isPitching = false; isInPlay = true; 
                
                // [수정] 새로 조율된 스윙별 정타 범위에 맞춰 파워히트 사운드 재생 조건 완벽 동기화
                let isPowerHit = false;
                if (swingType === 'big' && timeDiff <= 20) isPowerHit = true;
                else if (swingType === 'short' && timeDiff <= 40) isPowerHit = true;
                else if (swingType !== 'big' && swingType !== 'short' && timeDiff <= 25) isPowerHit = true;

                playHitSound(false, isPowerHit); 
                executeInPlaySequence(result); 
            }




        }

        function moveForward() { 
            if(boxStep > -2) { 
                boxStep--; updateListenerPosition(true); playWalkSound(); speak(getBoxName(boxStep)); 
            } else speak("더 이상 투수 쪽으로 갈 수 없습니다"); 
        }
        
function moveBackward() { 
            if(boxStep < 2) { boxStep++; updateListenerPosition(true); playWalkSound(); speak(getBoxName(boxStep)); } else speak("더 이상 포수 쪽으로 갈 수 없습니다"); 
        }

function playTargetSound() {
            let n=60+(pZIdx-3)+((pYIdx-2)*12); let buf=pitchBufferCache[n]; if(!buf||buf==="loading") return; let src=audioCtx.createBufferSource(); src.buffer=buf; let pan=audioCtx.createPanner();
            pan.panningModel='HRTF'; pan.positionX.value=0; pan.positionY.value=pYIdx===0?0.1:(pYIdx===1?0.55:(pYIdx===2?0.75:(pYIdx===3?0.95:1.4))); pan.positionZ.value=(pZIdx-5)*0.5+(isLeftPitcher?2:-2);
            audioCtx.listener.positionX.value=!isLeftBatter?-18:18; audioCtx.listener.positionY.value=1.5; audioCtx.listener.positionZ.value=0;
            if(audioCtx.listener.forwardX) { audioCtx.listener.forwardX.value=!isLeftBatter?1:-1; audioCtx.listener.forwardZ.value=0; } else { audioCtx.listener.setOrientation(!isLeftBatter?1:-1,0,0, 0,1,0); }
            src.connect(pan); pan.connect(masterGain); src.start(); src.stop(audioCtx.currentTime+0.5);
        }

        const gameArea = document.getElementById("gameArea");

gameArea.addEventListener("keydown", function(e) {
            if(["Space", "Enter", "ArrowLeft", "ArrowRight", "ArrowDown", "ArrowUp"].includes(e.code) || ['c','a','q'].includes(e.key.toLowerCase()) || (e.key>='0' && e.key<='9')) { e.preventDefault(); }
            const pt = [{id:'p_4seam',name:'포심'},{id:'p_2seam',name:'투심'},{id:'p_cutter',name:'커터'},{id:'p_split',name:'스플리터'},{id:'p_sinker',name:'싱커'},{id:'p_slider',name:'슬라이더'},{id:'p_curve',name:'커브'},{id:'p_fork',name:'포크볼'}];
            if(gameMode === 'pitching' && e.key>='0' && e.key<='9') { let idx = e.key==='0'?9:parseInt(e.key)-1; if(idx<pt.length) { if(e.shiftKey) { pPitchId = pt[idx].id; speak(pt[idx].name + " 채택"); } else { speak(pt[idx].name); } } return; }
            if(gameMode === 'pitching' && e.key === "Control") { speak("타자 스윙: " + (aiSwingType==='normal'?"일반":(aiSwingType==='big'?"큰 스윙":"짧은 스윙"))); return; }
            if(gameMode === 'pitching' && ["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space","Enter"].includes(e.code)) { if(isPitching) return; if(e.code === "Space") { playTargetSound(); return; } if(e.code === "Enter") { throwBall(true); return; } if(e.code==="ArrowLeft") { pZIdx=Math.max(0,pZIdx-1); playTargetSound(); } if(e.code==="ArrowRight") { pZIdx=Math.min(10,pZIdx+1); playTargetSound(); } if(e.code==="ArrowUp") { pYIdx=Math.min(4,pYIdx+1); playTargetSound(); } if(e.code==="ArrowDown") { pYIdx=Math.max(0,pYIdx-1); playTargetSound(); } return; }
            if (e.key.toLowerCase() === 'q') { speak(currentPitchName ? currentPitchName : "아직 투구되지 않았습니다."); return; }




            if (e.key.toLowerCase() === 'c' && e.shiftKey) { isLeftPitcher = !isLeftPitcher; speak(isLeftPitcher ? "좌투수" : "우투수"); return; }


if (e.key === "Shift") {
                if (gameMode === 'pitching') return;
                if (currentSwingMode !== 'normal') {
                    currentSwingMode = 'normal'; speak("스윙 취소. 일반 스윙");
                } else {
                    currentSwingMode = 'big'; speak("큰 스윙 온");
                }
            }


            else if (e.key === "Control") {
                if (currentSwingMode !== 'normal') {
                    currentSwingMode = 'normal'; speak("스윙 취소. 일반 스윙");
                } else {
                    currentSwingMode = 'short'; speak("짧은 스윙 온");
                }
            }
            else if (e.code === "Space") {
                swingBat(currentSwingMode);
            }
            else if (e.code === "Enter") { 
                if (isPitching || isInPlay) return; 
                throwBall(); 
            } 
            else if (e.code === "ArrowUp") { 
                if (isPitching) return; 
                isBunting = !isBunting;
                speak(isBunting ? "번트 자세" : "번트 자세 해제");
            }
            else if (e.key.toLowerCase() === "c") {
                if (isPitching) return; 
                isLeftBatter = !isLeftBatter; boxStep = 0; updateListenerPosition(true);
                speak((isLeftBatter ? "좌타석" : "우타석") + ", 타석 중앙입니다.");
            }
            else if (e.key.toLowerCase() === "a") {
                if (lastPitchSpeedMph === 0) { speak("아직 투구된 공이 없습니다."); return; }
                if (speedToggleState === 0) { speak(lastPitchSpeedMph + " 마일"); speedToggleState = 1; } 
                else { let kmh = Math.round(lastPitchSpeedMph * 1.60934); speak(kmh + " 킬로미터"); speedToggleState = 0; }
            }
            else if (e.code === "ArrowLeft") { 
                if (isPitching) return; 
                if (!isLeftBatter) moveForward(); else moveBackward(); 
            } 
            else if (e.code === "ArrowRight") { 
                if (isPitching) return; 
                if (!isLeftBatter) moveBackward(); else moveForward(); 
            }

else if (e.code === "ArrowDown") { 
                if (isPitching) return;
                speak("현재 " + getBoxName(boxStep) + "입니다"); 
            }
            else if (e.key.toLowerCase() === "z") {
                if (!isPitching && !isInPlay) { speak("현재 진행 중인 플레이가 없습니다."); return; }
                let elapsed = audioCtx.currentTime - rtBallStartTime;
                if (elapsed < 0) elapsed = 0;
                let ratio = elapsed / rtBallFlightTime;
                if (ratio > 1) ratio = 1;


let cX = rtBallStartX + (rtBallEndX - rtBallStartX) * ratio;


let cZ = rtBallStartZ + (rtBallEndZ - rtBallStartZ) * ratio;
                let maxH = rtBallTrajectory === 'fly' ? (rtBallEndZ >= -60 ? 8 : 25) : (rtBallTrajectory === 'wall' ? 2 : (rtBallTrajectory === 'line' ? 2.5 : 0));
                let cY = Math.sin(ratio * Math.PI) * maxH;


                speak(`${Math.round(cX)}, ${Math.round(cZ)}, ${Math.round(cY)}`);
            }




        });

        function preloadAllPitches() {




for (let midiNote = 30; midiNote <= 100; midiNote++) {

                    if (!pitchBufferCache[midiNote]) {
                        pitchBufferCache[midiNote] = "loading";
                        fetch(`./${midiNote}-2L-1.wav`).then(async res => {
                            if (res.ok) {
                                let arrayBuffer = await res.arrayBuffer();
                                pitchBufferCache[midiNote] = await audioCtx.decodeAudioData(arrayBuffer);
                            } else {
                                pitchBufferCache[midiNote] = null;
                            }

}).catch(e => { pitchBufferCache[midiNote] = null; });
                    }
            }
            updateListenerPosition(true);
        }
        


        preloadAllPitches();
    </script>
</body>
</html>

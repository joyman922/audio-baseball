<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오디오 베이스볼</title>

<style>
        body { font-family: sans-serif; background-color: #111; color: #fff; padding: 20px; display: flex; flex-direction: column; height: 100vh; margin: 0; box-sizing: border-box; }
        h1 { font-size: 20px; color: #aaa; text-align: center; margin: 0 0 10px 0; }
        .screen { display: none !important; }
        #gameConsole { flex-grow: 1; width: 100%; font-size: 24px; padding: 20px; line-height: 1.6; background-color: #000; color: #0f0; border: 3px solid #555; outline: none; resize: none; cursor: default; }
        #gameConsole:focus { border-color: #0f0; }
        .sr-only { position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    </style>
</head>
<body>
    <h1>오디오 베이스볼 콘솔 (조작: 방향키 상하좌우, 엔터, 스페이스, 백스페이스, 삭제 Del, 잠금 L, 전체선택 Ctrl+A)</h1>
    <div id="ariaAnnouncer" class="sr-only" aria-live="assertive"></div>
    <textarea id="gameConsole" readonly tabindex="0"></textarea>
    <div style="display:none;"> <div id="mainMenuScreen" class="screen">
        <h1>오디오 베이스볼</h1>



<button id="btnGoSinglePlayer">1. 개인 플레이</button>
        <button id="btnGoGacha">2. 카드 뽑기</button>
        <button id="btnGoInventory">3. 보관함</button>
        <button id="btnGoHelp">4. 도움말</button>
        <button id="btnGoVolume">5. 소리 설정</button>



        <div class="version-text">2026-05-17 버젼 1.150</div>
    </div>

    <div id="volumeScreen" class="screen">
        <h1>소리 설정</h1>
        <label for="volumeSlider">마스터 볼륨 (방향키로 조절)</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="10" step="5">
        <div>
            <button id="btnBackFromVolume">뒤로가기</button>
        </div>
    </div>



    <div id="singlePlayerScreen" class="screen">
        <h1>개인 플레이</h1>
        <button id="btnBattingPractice">1. 타격 연습</button>

<button id="btnPitchingPractice">2. 투구 연습</button>
        <button id="btnPracticeMatch">3. 연습경기</button>
        <button id="btnRegularMatch">4. 정규이닝 플레이</button>
        <button id="btnBackToMain">뒤로가기</button>


    </div>

<div id="practiceMatchScreen" class="screen">
        <h1>연습 경기</h1>
        <button id="btnPractice3">1. 3이닝</button> <button id="btnPractice6">2. 6이닝</button>
        <button id="btnPractice9">3. 9이닝</button> <button id="btnBackFromPractice">뒤로가기</button>
    </div>
    <div id="gameScreen" class="screen">
        <h1>타격 연습</h1>



        <label for="gameArea">야구 게임 컨트롤 창</label>
        <textarea id="gameArea" readonly aria-label="타격 연습창"></textarea>
        <div>

<button id="btnExitGame">나가기</button>
        </div>
    </div>


<div id="gachaScreen" class="screen"><h1>카드 뽑기</h1><div id="gachaStep1"><button id="btnDrawTeamMenu">1. 특정 팀 뽑기</button><button id="btnDrawAllMenu">2. 전체 구단 뽑기</button></div><div id="gachaStepLeague" style="display:none;"><h2>리그 선택</h2><button id="btnGachaAL">아메리칸 리그</button><button id="btnGachaNL">내셔널 리그</button></div><div id="gachaStepTeam" style="display:none;"><h2 id="gachaDrawTitle">팀 선택</h2><select id="gachaTeamSelect" size="10" style="font-size:18px; width:100%; margin-bottom:10px;"></select><div id="gachaTeamBtnGroup" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;"></div></div><div id="gachaStepDraw" style="display:none;"><h2 id="gachaTargetText"></h2><button id="btnDrawPitcher">투수 뽑기</button><button id="btnDrawBatter">타자 뽑기</button><button id="btnDrawAny">전체 수비수 뽑기</button></div><button id="btnBackFromGacha">뒤로가기</button></div>
    <div id="inventoryScreen" class="screen"><h1>보관함</h1><p id="invStatus">불러오는 중...</p><div id="invPageButtons" style="margin-bottom:10px; display:flex; gap:10px; align-items:center;"></div><div style="display:flex; gap:10px; margin-bottom:10px;"><select id="invSelect" size="10" style="flex:1; font-size:18px;"></select><div id="invBtnContainer" style="flex:1; display:flex; flex-direction:column; gap:5px; overflow-y:auto; max-height:250px;"></div></div><div style="display:flex; justify-content:space-between; margin-bottom:10px;"><button id="btnInvPrev">이전 25명</button><button id="btnInvNext">다음 25명</button></div><button id="btnInvRemoveRoster">선택 카드 로스터 제외</button><button id="btnBackFromInv">뒤로가기</button></div>

<div id="teamSelectScreen" class="screen"><h1>나의 구단 창단 (최초 1회)</h1><div id="teamLeagueGroup"><button id="btnLeagueAL">아메리칸 리그</button><button id="btnLeagueNL">내셔널 리그</button></div><div id="teamListGroup" style="display:none;"><h2 id="teamLeagueTitle"></h2><select id="teamSelect" size="10" style="font-size:18px; width:100%; margin-bottom:10px;"></select><div id="teamBtnGroup" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;"></div><button id="btnConfirmTeam">선택한 팀으로 창단 (스타터팩 자동 지급)</button></div><button id="btnBackFromTeam">뒤로가기</button></div>
    
    <div id="loadingScreen" class="screen"><h1>구단 로스터를 생성중입니다. 잠시만 기다려주세요...</h1></div>

<div id="regularPlayScreen" class="screen"><h1>페넌트레이스 (정규 시즌)</h1><button id="btnRegFull">1. 풀 시즌 (162경기)</button><button id="btnRegHalf">2. 하프 시즌 (81경기)</button><button id="btnRegQuarter">3. 1/4 시즌 (40경기)</button><button id="btnBackFromRegular">뒤로가기</button></div>



<div id="cardDetailScreen" class="screen"><h1>카드 상세 정보</h1><div id="cardDetailContent" tabindex="0" style="font-size:18px; margin-bottom:15px; background:#fff; padding:10px; border:1px solid #ccc; color:#000; text-align:left;"></div><button id="btnBackFromCardDetail">뒤로가기</button></div>
<script>





        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                const act = document.querySelector('.screen.active');
                if (act) { const b = act.querySelector('button[id^="btnBack"], button[id="btnExitGame"]'); if (b) b.click(); }
            }
        });
        function switchScreen(screenId, focusElementId) {
            document.querySelectorAll('.screen').forEach(screen => {



                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            if (focusElementId) {
                document.getElementById(focusElementId).focus();
            }
        }

document.getElementById("btnGoSinglePlayer").addEventListener("click", () => { switchScreen("singlePlayerScreen", "btnBattingPractice"); });
        document.getElementById("btnBackToMain").addEventListener("click", () => { switchScreen("mainMenuScreen", "btnGoSinglePlayer"); });
        document.getElementById("btnGoHelp").addEventListener("click", () => { speak("도움말 메뉴는 아직 준비 중입니다."); });
        
        // [추가] 볼륨 설정 메뉴 스크립트
        document.getElementById("btnGoVolume").addEventListener("click", () => { 
            switchScreen("volumeScreen", "volumeSlider"); 
            speak("소리 설정 메뉴입니다. 좌우 방향키로 볼륨을 조절하세요."); 
        });
        document.getElementById("btnBackFromVolume").addEventListener("click", () => { switchScreen("mainMenuScreen", "btnGoSinglePlayer"); });
        document.getElementById("volumeSlider").addEventListener("change", (e) => {
            let vol = e.target.value;
            masterGain.gain.value = vol / 100;
            speak(vol + " 퍼센트");
            if (audioBuffers["powerhit1"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["powerhit1"];
                src.connect(audioCtx.destination); src.start();
            }
        });

let gameMode = 'batting'; let pPitchId = 'p_4seam'; let pZIdx = 5; let pYIdx = 2; let aiSwingType = 'normal';
        document.getElementById("btnPitchingPractice").addEventListener("click", () => { gameMode = 'pitching'; document.querySelector("#gameScreen h1").innerText = "투구 연습"; document.getElementById("gameArea").setAttribute("aria-label", "투구 연습창"); switchScreen("gameScreen", "gameArea"); updateListenerPosition(true); speak("투구 연습 시작. 기본 구종 포심."); });



document.getElementById("btnPracticeMatch").addEventListener("click", () => { switchScreen("practiceMatchScreen", "btnPractice3"); speak("이닝을 선택하세요."); });
        document.getElementById("btnPractice3").addEventListener("click", () => { speak("3이닝 시작 (준비중)"); });
        document.getElementById("btnPractice6").addEventListener("click", () => { speak("6이닝 시작 (준비중)"); });
        document.getElementById("btnPractice9").addEventListener("click", () => { speak("9이닝 시작 (준비중)"); });
        document.getElementById("btnBackFromPractice").addEventListener("click", () => { switchScreen("singlePlayerScreen", "btnBattingPractice"); });

document.getElementById("btnBattingPractice").addEventListener("click", () => {


            gameMode = 'batting'; document.querySelector("#gameScreen h1").innerText = "타격 연습"; document.getElementById("gameArea").setAttribute("aria-label", "타격 연습창"); switchScreen("gameScreen", "gameArea");
            updateListenerPosition(true); speak("타격 연습 시작.");
        });


        document.getElementById("btnExitGame").addEventListener("click", () => {
            if (confirm("메인 메뉴로 돌아가시겠습니까?")) {
                switchScreen("mainMenuScreen", "btnGoSinglePlayer");
                speak("메인 메뉴로 돌아왔습니다.");
            } else {
                document.getElementById("gameArea").focus();
            }
        });

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffers = {}; 
        const pitchBufferCache = {}; 
        
        // [추가] 마스터 볼륨 제어용 글로벌 게인 노드 및 라우팅 패치
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;
        masterGain.connect(audioCtx.destination);
        
        const originalConnect = AudioNode.prototype.connect;
        AudioNode.prototype.connect = function() {
            if (arguments[0] === audioCtx.destination) {
                return originalConnect.call(this, masterGain);
            }
            return originalConnect.apply(this, arguments);
        };
        
// 탁한 포구음(glove3) 복구하여 다양성 추가 및 정타(powerhit) 소리 추가
        const SOUND_URLS = {



            hit1: "hit1.ogg", hit2: "hit2.ogg", hit3: "hit3.ogg",
            powerhit1: "powerhit1.ogg", powerhit2: "powerhit2.ogg",
            glove1: "glove1.ogg", glove2: "glove2.ogg", glove3: "glove3.ogg",
            foul1: "foul1.ogg", bunt: "bunt.ogg",
            swing1: "swing1.ogg", swing2: "swing2.ogg", walk1: "walk1.ogg",
            bounce: "bounce.ogg", fence: "fence.ogg",
            // [추가] 투수 와인드업 및 심판 판정 오디오 추가
            pitcher: "pitcher.ogg",
            umpire_ball: "umpire3-0-0.ogg", umpire_strike: "umpire3-1-0.ogg",
            umpire_safe1: "umpire3-2-0.ogg", umpire_safe2: "umpire3-2-1.ogg",
            umpire_out: "umpire3-3-0.ogg"
        };



        async function loadSound(name, url) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
                }
            } catch (e) {}
        }
        for (let key in SOUND_URLS) loadSound(key, SOUND_URLS[key]);

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            return buffer;
        }
        const noiseBuffer = createNoiseBuffer();

        const baseFrequencies = [220.00, 233.08, 246.94, 261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00];
        function getPianoFrequency(noteIndex, octaveIndex) { return baseFrequencies[noteIndex] * Math.pow(2, octaveIndex - 2); }

const zoneTop = 1.05; const zoneBottom = 0.50; 
const zoneInside = 1.1; const zoneOutside = -1.1; // C(1.0) ~ E(-1.0) 존으로 타이트하게 축소


let isLeftBatter = false, isLeftPitcher = false, isPitching = false, hasSwung = false, isBunting = false, isInPlay = false; 
        let pitchStartTime = 0, pitchTimeout, currentPitchName = "";



        let currentFlightTime = 0, lastPitchSpeedMph = 0, speedToggleState = 0; 

let activeNodes = [], boxStep = 0, actualY, actualZ, isStrike = false, pitchResultText = "";


let rtBallStartX = 0, rtBallStartZ = 0, rtBallEndX = 0, rtBallEndZ = 0, rtBallStartTime = 0, rtBallFlightTime = 0.1, rtBallTrajectory = 'ground';
        let beaconSrc = null;

        
        let currentSwingMode = 'normal';




        const announcer = document.getElementById("ariaAnnouncer");
        function speak(text) { announcer.textContent = ""; setTimeout(() => { announcer.textContent = text; }, 50); }

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function getBoxName(step) {
            if (step === 0) return "타석 중앙";
            return step < 0 ? "앞으로 " + Math.abs(step) + "칸" : "뒤로 " + step + "칸";
        }

        function getAvatarX() {
            return isLeftBatter ? (boxStep * -0.45) : (boxStep * 0.45);
        }

// [수정] 타격 시 투구/바람 소리를 즉시(0.02초) 차단하여 빈틈없이 타격감을 극대화 (오디오 공백 없음)
        function handleHitFadeOut() {
            const now = audioCtx.currentTime;
            activeNodes.forEach(node => {
                try {
                    if (node.type === 'pitch' || node.type === 'inplay') {
                        node.gain.cancelScheduledValues(now);
                        node.gain.setValueAtTime(node.gain.value, now);
                        // 0.3초였던 페이드아웃을 0.02초로 단축시켜 타격음과 겹치는 지저분한 소리를 즉시 날려버림
                        node.gain.exponentialRampToValueAtTime(0.001, now + 0.02); 
                        node.src.stop(now + 0.05); 
                    } else if (node.type === 'mitt') {
                        node.src.stop(now); 
                    }
                } catch(e) {}
            });
            activeNodes = [];
        }



        function stopAllActiveNodes() {
            activeNodes.forEach(node => { try { node.src.stop(); } catch(e) {} });
            activeNodes = [];
        }

function updateListenerPosition(instant = false) {
            let currentListenerZ = gameMode === 'pitching' ? 0 : (isLeftBatter ? -3.5 : 3.5); let avatarX = gameMode === 'pitching' ? -18 : getAvatarX(); let avatarY = gameMode === 'pitching' ? 1.5 : 0;
            let fX = 0; let fZ = gameMode === 'pitching' ? (!isLeftPitcher ? 1 : -1) : (isLeftBatter ? 1 : -1);
            if(audioCtx.listener.forwardX) { audioCtx.listener.forwardX.value=fX; audioCtx.listener.forwardZ.value=fZ; } else { audioCtx.listener.setOrientation(fX,0,fZ, 0,1,0); }
            audioCtx.listener.positionX.cancelScheduledValues(0); audioCtx.listener.positionY.cancelScheduledValues(0); audioCtx.listener.positionZ.cancelScheduledValues(0);
            if (instant) {


                audioCtx.listener.positionX.setValueAtTime(avatarX, audioCtx.currentTime);
                audioCtx.listener.positionY.setValueAtTime(avatarY, audioCtx.currentTime);
                audioCtx.listener.positionZ.setValueAtTime(currentListenerZ, audioCtx.currentTime);
            } else {





                audioCtx.listener.positionX.linearRampToValueAtTime(avatarX, audioCtx.currentTime + 1.0);
                audioCtx.listener.positionY.setValueAtTime(avatarY, audioCtx.currentTime);
                audioCtx.listener.positionZ.linearRampToValueAtTime(currentListenerZ, audioCtx.currentTime + 1.0);
            }

        }

function playWalkSound() {
            const panner = audioCtx.createPanner();
            panner.panningModel = 'equalpower'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 25;
            panner.positionX.value = getAvatarX(); panner.positionY.value = 0; panner.positionZ.value = isLeftBatter ? -3.4 : 3.4; 
            const walkGain = audioCtx.createGain(); walkGain.gain.value = 0.5;



            if (audioBuffers["walk1"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["walk1"];
                src.connect(panner); panner.connect(walkGain); walkGain.connect(audioCtx.destination); src.start();
            }
        }

function playSwingSound() {
            const r = Math.floor(Math.random() * 2) + 1;

if (audioBuffers[`swing${r}`]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers[`swing${r}`];
                const p = audioCtx.createPanner(); p.panningModel='HRTF'; p.distanceModel='linear'; p.refDistance=1; p.maxDistance=1000; p.rolloffFactor=0.05; p.channelCount=1; p.channelCountMode="explicit";
                p.positionX.value=getAvatarX(); p.positionY.value=1.0; p.positionZ.value=isLeftBatter?-3.4:3.4;
                src.connect(p); p.connect(masterGain); src.start();
            }

        }
// [수정] 스테레오 사운드 분산 현상을 막고 타석 중앙에서 명확히 들리도록 HRTF Panner 강제 적용
        function playHitSound(isBuntHit = false, isPowerHit = false) {
            let bufferName = isBuntHit ? "bunt" : `hit${Math.floor(Math.random() * 3) + 1}`;
            let hitVolume = 0.7; 

            if (isPowerHit && !isBuntHit) {
                bufferName = `powerhit${Math.floor(Math.random() * 2) + 1}`;
                hitVolume = 1.4; 
            }
            
            if (audioBuffers[bufferName]) {
                const source = audioCtx.createBufferSource(); source.buffer = audioBuffers[bufferName];
                
// [추가] 파워히트 사운드를 타석 중앙(0,0)에 완벽히 묶어두는 3D 음향 노드
                const panner = audioCtx.createPanner();
                panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
                panner.channelCount = 1; panner.channelCountMode = "explicit";
                panner.positionX.value = getAvatarX(); panner.positionZ.value = isLeftBatter ? -3.5 : 3.5; panner.positionY.value = 1.0;



                const gainNode = audioCtx.createGain(); 
                gainNode.gain.value = hitVolume;
                
                source.connect(panner); panner.connect(gainNode); gainNode.connect(audioCtx.destination); source.start();
            }
        }





function playBatFoulSound() {
            if (audioBuffers["foul1"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["foul1"];
                const p = audioCtx.createPanner(); p.panningModel='HRTF'; p.distanceModel='linear'; p.refDistance=1; p.maxDistance=1000; p.rolloffFactor=0.05; p.channelCount=1; p.channelCountMode="explicit";
                p.positionX.value=getAvatarX(); p.positionY.value=1.0; p.positionZ.value=isLeftBatter?-3.5:3.5;
                src.connect(p); p.connect(masterGain); src.start();
            }
        }


// [수정] 스테레오 파일의 공간감 상실(중앙 집중)을 막기 위해 channelCount = 1 강제 적용 및 정적 좌표 할당
        function playBounceSound(x, z, timeOffset = 0) {
            const now = audioCtx.currentTime + timeOffset;
            const panner = audioCtx.createPanner();
            panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 1000; panner.rolloffFactor = 0.05;
            panner.channelCount = 1; panner.channelCountMode = "explicit"; // 오디오를 강제 모노로 묶어 3D 위치를 명확히 함
            
            panner.positionX.value = x;
            panner.positionZ.value = z;
            panner.positionY.value = 0; 
            
            if (audioBuffers["bounce"]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers["bounce"];
                src.connect(panner); panner.connect(audioCtx.destination); src.start(now);
            }
        }

        // [추가] 3D 공간 음향이 적용된 심판 판정 소리 출력 함수

function playUmpireSound(type, x, z) {
            const panner = audioCtx.createPanner();
//-심판 거리감 소리, 첫 숫자가 소리가 0이 되는 최대 거리, 뒤 숫자가 거리에 따라 줄어드는 가속도
            panner.panningModel = 'HRTF'; panner.distanceModel = 'linear'; panner.refDistance = 1; panner.maxDistance = 500; panner.rolloffFactor = 1.0;



            panner.channelCount = 1; panner.channelCountMode = "explicit";

            
            panner.positionX.value = x; panner.positionZ.value = z; panner.positionY.value = 1.5; 

            let bufferName = "";
            if (type === 'ball') bufferName = "umpire_ball";
            else if (type === 'strike') bufferName = "umpire_strike";
            else if (type === 'out') bufferName = "umpire_out";
            else if (type === 'safe') bufferName = Math.random() < 0.5 ? "umpire_safe1" : "umpire_safe2";

            if (audioBuffers[bufferName]) {
                const src = audioCtx.createBufferSource(); src.buffer = audioBuffers[bufferName];
//- 아래 숫자가 심판 소리

                case "GACHA_LEAGUE":
                    if(isBack || K === "ArrowLeft") window.changeState("GACHA_MENU");
                    else if(K === "ArrowUp") { cur.lg = Math.max(0, cur.lg - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.lg = Math.min(lists.menu.length - 1, cur.lg + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { tempVars.lg = cur.lg === 0 ? 'AL' : 'NL'; window.changeState("GACHA_DIV"); } break;
                case "GACHA_DIV":
                    if(isBack || K === "ArrowLeft") window.changeState("GACHA_LEAGUE");
                    else if(K === "ArrowUp") { cur.div = Math.max(0, cur.div - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.div = Math.min(lists.menu.length - 1, cur.div + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { tempVars.div = lists.menu[cur.div]; window.changeState("GACHA_TEAM"); } break;
                case "GACHA_TEAM":
                    if(isBack || K === "ArrowLeft") window.changeState("GACHA_DIV");
                    else if(K === "ArrowUp") { cur.team = Math.max(0, cur.team - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.team = Math.min(lists.menu.length - 1, cur.team + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { tempVars.gachaTeam = lists.menu[cur.team]; window.changeState("GACHA_DRAW"); } break;
                case "GACHA_DRAW":
                    if(isBack || K === "ArrowLeft") window.changeState("MAIN_MENU");
                    else if(K === "ArrowUp") { cur.draw = Math.max(0, cur.draw - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.draw = Math.min(lists.menu.length - 1, cur.draw + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { window.drawGachaCard(tempVars.gachaTeam, cur.draw === 0 ? 'P' : (cur.draw === 1 ? 'B' : 'Any')); } break;
                case "TEAM_LEAGUE":
                    if(isBack || K === "ArrowLeft") window.changeState("MAIN_MENU");
                    else if(K === "ArrowUp") { cur.lg = Math.max(0, cur.lg - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.lg = Math.min(lists.menu.length - 1, cur.lg + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { tempVars.lg = cur.lg === 0 ? 'AL' : 'NL'; window.changeState("TEAM_DIV"); } break;
                case "TEAM_DIV":
                    if(isBack || K === "ArrowLeft") window.changeState("TEAM_LEAGUE");
                    else if(K === "ArrowUp") { cur.div = Math.max(0, cur.div - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.div = Math.min(lists.menu.length - 1, cur.div + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { tempVars.div = lists.menu[cur.div]; window.changeState("TEAM_TEAM"); } break;
                case "TEAM_TEAM":
                    if(isBack || K === "ArrowLeft") window.changeState("TEAM_DIV");
                    else if(K === "ArrowUp") { cur.team = Math.max(0, cur.team - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.team = Math.min(lists.menu.length - 1, cur.team + 1); window.readCurrentState(); }
                    else if(K === "Enter") { speak(`${lists.menu[cur.team]} 창단합니까? 엔터로 확정합니다.`); window.currentState = "TEAM_CONFIRM"; } break;

case "TEAM_LOADING": return; // 로딩 중에는 백스페이스를 포함한 모든 키 씹기
                case "TEAM_CONFIRM":
                    if(isBack || K === "ArrowLeft") { window.currentState = "TEAM_TEAM"; window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { window.myTeam = lists.menu[cur.team]; localStorage.setItem('myTeam', window.myTeam); grantStarterPack(window.myTeam); } break;
                case "TEAM_COMPLETE":
                    if(K === "Enter" || K === "ArrowRight") { cur.single = 3; window.changeState("REGULAR_SEASON"); } break;


                case "SOUND_SETTINGS":


                    if(isBack || K === "ArrowLeft") window.changeState("MAIN_MENU");
                    else if(K === "ArrowUp") { cur.sound = Math.min(100, cur.sound + 10); masterGain.gain.value = cur.sound / 100; window.readCurrentState(); }
                    else if(K === "ArrowDown") { cur.sound = Math.max(0, cur.sound - 10); masterGain.gain.value = cur.sound / 100; window.readCurrentState(); } break;
                case "ROSTER_MENU":
                    if(isBack || K === "ArrowLeft") window.changeState("MAIN_MENU");
                    else if(K === "ArrowUp") { cur.rst = Math.max(0, cur.rst - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.rst = Math.min(lists.menu.length - 1, cur.rst + 1); window.readCurrentState(); }
                    else if(K === "Enter" || K === "ArrowRight") { if(cur.rst === 0) { cur.slot = 0; window.changeState("ROSTER_SLOTS"); } else { tempVars.page = 0; tempVars.delSet.clear(); loadAllCardsPage(0); cur.all = 0; window.changeState("ALL_CARDS"); } } break;

case "ROSTER_SLOTS":
                    if(isBack || K === "ArrowLeft") { tempVars.swapSource = null; window.changeState("ROSTER_MENU"); }
                    else if(K === "ArrowUp") { cur.slot = Math.max(0, cur.slot - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.slot = Math.min(15, cur.slot + 1); window.readCurrentState(); }
                    else if(K === " ") { if(cur.slot === 9 || cur.slot === 15) { speak("불펜과 대타 목록은 위치 교체 선택을 할 수 없습니다."); } else if(tempVars.swapSource === cur.slot) { tempVars.swapSource = null; window.readCurrentState(); } else if(tempVars.swapSource === null) { tempVars.swapSource = cur.slot; window.readCurrentState(); } else swapRosterSlots(tempVars.swapSource, cur.slot); }
                    else if(K === "ArrowRight" || K === "Enter") { lists.players = getFilteredPlayers(cur.slot); cur.plyr = 0; window.changeState("ROSTER_PLAYERS"); } break;




                case "ROSTER_PLAYERS":
                    if(isBack || K === "ArrowLeft") { let os = cur.slot; window.changeState("ROSTER_SLOTS"); cur.slot = os; window.readCurrentState(); }
                    else if(K === "ArrowUp") { cur.plyr = Math.max(0, cur.plyr - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.plyr = Math.min(lists.players.length - 1, cur.plyr + 1); window.readCurrentState(); }
                    else if(K === " " || K === "Enter") { if(lists.players.length > 0) toggleRosterAssignment(lists.players[cur.plyr], cur.slot); window.readCurrentState(); }
                    else if(K === "ArrowRight") { if(lists.players.length > 0) { lists.info = getPlayerInfoLines(lists.players[cur.plyr], cur.slot); cur.info = 0; window.changeState("ROSTER_INFO"); } } break;

case "ROSTER_INFO":
                    if(isBack || K === "ArrowLeft") { if(tempVars.infoSrc === "ALL_CARDS") { tempVars.infoSrc = null; window.changeState("ALL_CARDS"); } else { let op = cur.plyr; window.changeState("ROSTER_PLAYERS"); cur.plyr = op; window.readCurrentState(); } }


                    else if(K === "ArrowUp") { cur.info = Math.max(0, cur.info - 1); window.readCurrentState(); } else if(K === "ArrowDown") { cur.info = Math.min(lists.info.length - 1, cur.info + 1); window.readCurrentState(); }
                    else if(K === " " || K === "Enter") { toggleRosterAssignment(lists.players[cur.plyr], cur.slot); lists.info = getPlayerInfoLines(lists.players[cur.plyr], cur.slot); window.readCurrentState(); } break;


case "ALL_CARDS":

if(isBack || (K === "ArrowLeft" && !e.ctrlKey)) window.changeState("ROSTER_MENU");
                    else if(K === "ArrowRight" && !e.ctrlKey) { if(cur.all > 0) { lists.info = getPlayerInfoLines(lists.allCardsPage[cur.all - 1]); cur.info = 0; tempVars.infoSrc = "ALL_CARDS"; window.changeState("ROSTER_INFO"); } }


else if(K === "ArrowDown") { cur.all = Math.min(lists.allCardsPage.length, cur.all + 1); window.readCurrentState(); } else if(K === "ArrowUp") { cur.all = Math.max(0, cur.all - 1); window.readCurrentState(); }
                    else if(K === "Home") { cur.all = 0; window.readCurrentState(); } else if(K === "End") { cur.all = lists.allCardsPage.length; window.readCurrentState(); }



                    else if(e.ctrlKey && K === "ArrowRight") { tempVars.page++; loadAllCardsPage(tempVars.page); cur.all = 0; window.readCurrentState(); }
                    else if(e.ctrlKey && K === "ArrowLeft") { if(tempVars.page > 0) { tempVars.page--; loadAllCardsPage(tempVars.page); cur.all = 0; window.readCurrentState(); } }

else if(K === "l") { if(cur.all > 0) { let c = lists.allCardsPage[cur.all - 1]; c.isLocked = !c.isLocked; window.saveCards(); speak(c.isLocked ? "잠금" : "잠금 해제됨"); window.readCurrentState(); } }



else if(K === " ") { if(cur.all > 0) { let c = lists.allCardsPage[cur.all - 1]; if(c.isLocked) return speak("잠긴 카드"); if(tempVars.delSet.has(c.id)) { tempVars.delSet.delete(c.id); speak("해제"); } else { tempVars.delSet.add(c.id); speak("삭제선택"); } window.readCurrentState(); } }


                    else if(e.ctrlKey && K === "a") { lists.allCardsPage.forEach(c => { if(!c.isLocked) tempVars.delSet.add(c.id); }); speak("페이지 전체 선택"); window.readCurrentState(); }

else if(K === "Delete") { if(cur.all > 0 && tempVars.delSet.size === 0) tempVars.delSet.add(lists.allCardsPage[cur.all - 1].id); if(tempVars.delSet.size > 0) window.changeState("CONFIRM_DELETE"); else speak("카드가 없습니다."); } break;


                case "CONFIRM_DELETE":
                    if(isBack || K === "ArrowLeft") window.changeState("ALL_CARDS");
                    else if(K === "Enter") { window.myCards = window.myCards.filter(c => !tempVars.delSet.has(c.id)); tempVars.delSet.clear(); window.saveCards(); loadAllCardsPage(tempVars.page); cur.all = 0; speak("삭제됨"); window.changeState("ALL_CARDS"); } break;
            }
        }




        initAllBaseballDatabase();



      function  preloadAllPitches(){






for (let midiNote = 30; midiNote <= 100; midiNote++) {

                    if (!pitchBufferCache[midiNote]) {
                        pitchBufferCache[midiNote] = "loading";
                        fetch(`./${midiNote}-2L-1.wav`).then(async res => {
                            if (res.ok) {
                                let arrayBuffer = await res.arrayBuffer();
                                pitchBufferCache[midiNote] = await audioCtx.decodeAudioData(arrayBuffer);
                            } else {
                                pitchBufferCache[midiNote] = null;
                            }

}).catch(e => { pitchBufferCache[midiNote] = null; });
                    }
            }
            updateListenerPosition(true);
        }
        


        preloadAllPitches();
    </script>
</body>
</html>
